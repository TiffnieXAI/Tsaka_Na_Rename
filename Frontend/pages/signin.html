<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Centry</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-lowest": "#060e20",
                        "surface": "#0b1326",
                        "inverse-on-surface": "#283044",
                        "surface-container-high": "#222a3d",
                        "on-tertiary-container": "#ad85ff",
                        "on-error": "#690005",
                        "tertiary-fixed": "#eaddff",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-primary-fixed-variant": "#363c96",
                        "surface-container-highest": "#2d3449",
                        "outline-variant": "#464652",
                        "on-tertiary-fixed": "#25005a",
                        "error": "#ffb4ab",
                        "on-background": "#dae2fd",
                        "error-container": "#93000a",
                        "secondary": "#c6c6c7",
                        "on-tertiary-fixed-variant": "#5a00c6",
                        "on-secondary-fixed-variant": "#454747",
                        "primary-container": "#202682",
                        "surface-tint": "#bec2ff",
                        "inverse-surface": "#dae2fd",
                        "tertiary-fixed-dim": "#d2bbff",
                        "inverse-primary": "#4e55b0",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#8c93f2",
                        "surface-container": "#171f33",
                        "outline": "#908f9d",
                        "on-secondary": "#2f3131",
                        "on-surface": "#dae2fd",
                        "on-primary": "#1d237f",
                        "tertiary-container": "#420094",
                        "surface-container-low": "#131b2e",
                        "primary-fixed-dim": "#bec2ff",
                        "on-tertiary": "#3f008e",
                        "secondary-container": "#454747",
                        "background": "#0b1326",
                        "primary": "#bec2ff",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-secondary-container": "#b4b5b5",
                        "surface-dim": "#0b1326",
                        "on-surface-variant": "#c7c5d4",
                        "tertiary": "#d2bbff",
                        "surface-bright": "#31394d",
                        "on-primary-fixed": "#00016d",
                        "surface-variant": "#2d3449",
                        "secondary-fixed": "#e2e2e2",
                        "primary-fixed": "#e0e0ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "sm": "16px",
                        "md": "24px",
                        "lg": "32px",
                        "xl": "48px",
                        "xs": "8px",
                        "sidebar_width": "280px",
                        "gutter": "20px",
                        "base": "4px"
                    },
                    fontFamily: {
                        "headline-lg": ["Geist"],
                        "body-md": ["Inter"],
                        "label-sm": ["JetBrains Mono"],
                        "label-md": ["JetBrains Mono"],

                    },
                    fontSize: {

                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],

                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

            },

    <style>
        .glass-card {
            background: rgba(23, 31, 51, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glow-border:focus-within {
            box-shadow: 0 0 15px rgba(32, 38, 130, 0.6);
            border-color: #bec2ff;
        }
        .grid-bg {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary/30 grid-bg">
    <!-- Top AppBar -->
    <header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0_0_15px_rgba(32,38,130,0.4)] h-16 flex items-center justify-between px-xl">
        <div class="flex items-center gap-sm">
            <img src="assets\centryLogo_noBG.png" class="h-10 w-auto" alt="Centry Shield Logo">
            <div class="flex flex-col">
                <span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Centry</span>
                <span class="font-label-sm text-label-sm text-on-surface-variant hidden md:block opacity-70">Cybersecurity for the backbone of the Philippine economy</span>
            </div>
        </div>
        <button class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors duration-200 group active:scale-95" onclick="window.history.back()">
            <span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
            <span class="font-label-md text-label-md uppercase tracking-wider">Back</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-md relative overflow-hidden pt-20">
        <!-- Ambient Atmospheric Elements -->
        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-tertiary/10 rounded-full blur-[120px]"></div>
        
        <!-- Login Form Container -->
        <div class="glass-card w-full max-w-[480px] rounded-xl p-lg md:p-xl relative z-10">
            <!-- Top Shimmer Line -->
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
            
            <div class="text-center mb-lg">
                <div class="w-16 h-16 mx-auto mb-md relative">
                    <div class="absolute inset-0 bg-primary/20 blur-xl rounded-full"></div>
                    <span class="material-symbols-outlined text-primary text-5xl relative z-10" style="font-variation-settings: 'FILL' 1;">security</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Sign in</h1>
                <p class="font-body-md text-on-surface-variant">Authorized Personnel Only. Verification required.</p>
            </div>

            <form id="loginForm" class="space-y-lg">
                <!-- Username Field -->
                <div class="space-y-xs group">
                    <label for="username" class="font-label-md text-label-md text-on-surface-variant block ml-1">USERNAME</label>
                    <div class="relative flex items-center glow-border border border-outline-variant rounded-lg bg-[#060e20] transition-all duration-300">
                        <span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">person</span>
                        <input type="text" id="username" name="username" required placeholder="cyber_sentinel_01" class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 font-body-md">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-xs group">
                    <label for="password" class="font-label-md text-label-md text-on-surface-variant block ml-1">PASSWORD</label>
                    <div class="relative flex items-center glow-border border border-outline-variant rounded-lg bg-[#060e20] transition-all duration-300">
                        <span class="material-symbols-outlined absolute left-4 text-outline text-[20px]">lock</span>
                        <input type="password" id="password" name="password" required placeholder="••••••••" class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-0 font-body-md">
                        <button type="button" class="absolute right-4 text-outline hover:text-primary transition-colors" onclick="togglePassword()">
                            <span class="material-symbols-outlined text-[20px]" id="passwordIcon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Sign In Button -->
                <div class="pt-md">
                    <button type="submit" id="submitBtn" disabled class="w-full h-14 bg-secondary-container text-on-secondary-container rounded-lg font-headline-md text-headline-md flex items-center justify-center gap-sm transition-all duration-300 cursor-not-allowed opacity-60 shadow-lg border border-white/5">
                        <span>SIGN IN</span>
                        <span class="material-symbols-outlined">login</span>
                    </button>
                </div>
            </form>

            <div class="mt-lg text-center">
                <p class="font-body-md text-on-surface-variant">
                    New to Centry? 
                    <a href="register.html" class="text-primary hover:text-tertiary font-medium transition-colors ml-1 underline-offset-4 hover:underline">Register Here</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-surface-container-lowest border-t border-outline-variant w-full mt-auto">
        <div class="flex flex-col md:flex-row justify-between items-center px-xl py-lg gap-md max-w-[1440px] mx-auto">
            <div class="flex flex-col gap-xs">
                <span class="font-headline-sm text-headline-sm font-black text-on-surface">SAGE</span>
                <span class="font-label-sm text-label-sm text-on-surface-variant opacity-70">© 2024 SAGE. Cybersecurity for the backbone of the Philippine economy.</span>
            </div>
            
            <nav class="flex flex-wrap justify-center gap-lg">
                <a href="#" class="font-label-sm text-label-sm text-on-surface-variant hover:text-tertiary transition-colors">About Us</a>
                <a href="#" class="font-label-sm text-label-sm text-on-surface-variant hover:text-tertiary transition-colors">Contact</a>
                <a href="#" class="font-label-sm text-label-sm text-on-surface-variant hover:text-tertiary transition-colors">Terms</a>
                <a href="#" class="font-label-sm text-label-sm text-on-surface-variant hover:text-tertiary transition-colors">Cookie Policy</a>
            </nav>
        </div>
    </footer>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');

        function togglePassword() {
            const icon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function validateInputs() {
            const isUserValid = usernameInput.value.trim().length > 0;
            const isPassValid = passwordInput.value.trim().length > 0;
            
            if (isUserValid && isPassValid) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-secondary-container', 'text-on-secondary-container', 'cursor-not-allowed', 'opacity-60');
                submitBtn.classList.add('bg-primary-container', 'text-white', 'cursor-pointer', 'opacity-100', 'active:scale-95', 'hover:shadow-[0_0_20px_rgba(32,38,130,0.6)]');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'cursor-not-allowed', 'opacity-60');
                submitBtn.classList.remove('bg-primary-container', 'text-white', 'cursor-pointer', 'opacity-100', 'active:scale-95', 'hover:shadow-[0_0_20px_rgba(32,38,130,0.6)]');
            }
        }

        usernameInput.addEventListener('input', validateInputs);
        passwordInput.addEventListener('input', validateInputs);

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> VALIDATING...';
            setTimeout(() => {

                // TODO: Implement actual authentication logic here. For now, we simulate a successful login.
                
                submitBtn.innerHTML = 'WELCOME  <span class="material-symbols-outlined">check_circle</span>';
                submitBtn.classList.remove('bg-primary-container');
                submitBtn.classList.add('bg-green-600', 'border-green-400');
            }, 1500);
            setTimeout(() => {
                window.location.href="dashboard.html";
            }, 3000);
            
        
        });
    </script>
</body>
</html>
