[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# timezone for the "created date" comment inside generated revision files
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# NOTE: no sqlalchemy.url here on purpose - alembic/env.py builds it from
# app.config.settings (same env vars / .env file the app itself uses), so
# there's exactly one place that knows how to construct the DB URL.

[post_write_hooks]
# no-op - add a black/ruff hook here later if the team wants generated
# migrations auto-formatted.

# --- logging (alembic's default boilerplate, unchanged) --------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
